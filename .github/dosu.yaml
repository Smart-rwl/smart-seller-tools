version: 1

dosu:
  auto_respond: true

  project_context: >
    Smart Seller Tools repository providing automation tools 
    for e-commerce sellers to manage listings, analyze data,
    and improve selling workflows.

  ignore_labels:
    - "no-bot"
    - "wontfix"
    - "security"

  issue_triage:
    enabled: true
    labels:
      - "bug"
      - "enhancement"
      - "question"
      - "documentation"

  reply_threshold: 0.7