name: "Auto-Sync Repository Docs"
on:
  push:
    branches: [main]
    paths:
      - 'src/**' # Only run when you add or change a tool

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update README
        run: python scripts/sync-readme.py

      - name: Commit changes as github-actions[bot]
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "docs: auto-update tools list"
          git push
