name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Show Node Version
        run: |
          node -v
          npm -v

      - name: Install Node deps
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Run ESLint
        if: hashFiles('.eslintrc*') != ''
        run: npx eslint . || true

      - name: Run Tests
        if: hashFiles('package.json') != ''
        run: npm test || true