name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Detect environment automatically (Node or Python)
      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Node deps
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Run ESLint
        if: hashFiles('.eslintrc*') != ''
        run: npx eslint . || true

      - name: Run Tests
        if: hashFiles('package.json') != ''
        run: npm test || true
