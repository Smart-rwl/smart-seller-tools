name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path & branch labels
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by changed files and branch
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false
          configuration-path: .github/labeler.yml

  size:
    name: Apply size label
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by size
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size:xs'
          xs_max_size: '10'
          s_label: 'size:s'
          s_max_size: '100'
          m_label: 'size:m'
          m_max_size: '500'
          l_label: 'size:l'
          l_max_size: '1000'
          xl_label: 'size:xl'
          message_if_xl: >
            This PR is large (1000+ lines changed).
            Consider splitting into smaller PRs for easier review.
          files_to_ignore: |
            package-lock.json
            yarn.lock
            pnpm-lock.yaml
            **/*.snap