name: Seller Automation

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  run-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Run automation script
        run: node src/index.js
