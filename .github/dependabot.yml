version: 2
updates:
  # 1. Update npm dependencies (Next.js, React, Prisma, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

    open-pull-requests-limit: 10
    rebase-strategy: auto

    # Consolidate updates to prevent PR fatigue
    groups:
      nextjs-core:
        patterns:
          - "next"
          - "react*"

      tooling:
        patterns:
          - "eslint*"
          - "typescript"
          - "postcss"
          - "tailwindcss"

    labels:
      - "dependencies"
      - "javascript"

  # 2. Update GitHub Actions (CI/CD workflow dependencies)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    labels:
      - "dependencies"
      - "github-actions"